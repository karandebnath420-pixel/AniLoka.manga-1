<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AniLoka Manga — Search</title>
<link rel="stylesheet" href="style.css">
<style>
body{padding-top:62px}
/* search hero */
.srch-hero{padding:40px 4vw 24px;background:linear-gradient(to bottom,rgba(255,215,0,.04),transparent)}
.srch-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.05em;color:#fff;margin-bottom:6px}
.srch-title span{color:var(--accent)}
.srch-sub{color:var(--text-dim);font-size:.88rem;margin-bottom:20px}
.srch-bar-big{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0 18px;max-width:700px;transition:border-color .2s,box-shadow .2s}
.srch-bar-big:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.srch-bar-big input{background:transparent;border:none;outline:none;color:#fff;font-size:1.05rem;padding:16px 0;flex:1;min-width:0}
.srch-bar-big input::placeholder{color:var(--text-muted)}
.srch-clear{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;transition:all .2s;font-size:.9rem;border:none}
.srch-clear:hover{background:rgba(255,255,255,.15);color:#fff}
/* filters */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;padding:0 4vw;margin-bottom:24px;align-items:center}
.filter-label{font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.filter-select{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:#fff;font-size:.82rem;padding:8px 12px;outline:none;cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:var(--accent)}
.filter-select option{background:var(--card2)}
.active-filters{display:flex;gap:7px;flex-wrap:wrap;padding:0 4vw;margin-bottom:18px}
.af-tag{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:var(--accent-dim);border:1px solid var(--border);color:var(--accent);font-size:.76rem;font-weight:700}
.af-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;line-height:1;padding:0}
/* sort bar */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:0 4vw;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.result-count{font-size:.82rem;color:var(--text-dim)}
.result-count span{color:#fff;font-weight:700}
.sort-opts{display:flex;gap:6px}
.sort-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s}
.sort-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* view toggle */
.view-toggle{display:flex;gap:4px}
.vt-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;transition:all .2s}
.vt-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* results grid */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding:0 4vw}
.results-grid.list-view{grid-template-columns:1fr;gap:10px}
/* list card */
.list-card{display:flex;gap:14px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .2s,background .2s}
.list-card:hover{border-color:var(--accent);background:var(--card2)}
.list-card img{width:70px;height:100px;object-fit:cover;border-radius:8px;flex-shrink:0}
.list-info{flex:1;min-width:0}
.list-title{font-weight:700;font-size:.9rem;margin-bottom:4px}
.list-author{font-size:.78rem;color:var(--accent);margin-bottom:6px}
.list-desc{font-size:.78rem;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.list-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
/* no results */
.no-results{padding:60px 4vw;text-align:center}
.no-results .nr-icon{font-size:4rem;margin-bottom:16px}
.no-results h3{font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:8px}
.no-results p{color:var(--text-dim);font-size:.88rem;max-width:320px;margin:0 auto 20px}
/* suggestions */
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:0 0 var(--radius-lg) var(--radius-lg);z-index:50;max-height:280px;overflow-y:auto}
.sugg-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background .15s}
.sugg-item:hover{background:var(--card3)}
.sugg-item img{width:36px;height:50px;object-fit:cover;border-radius:6px;flex-shrink:0}
.sugg-info .sugg-title{font-weight:700;font-size:.85rem}
.sugg-info .sugg-meta{font-size:.74rem;color:var(--text-dim)}
/* pagination */
.pagination{display:flex;gap:6px;justify-content:center;padding:30px 4vw;flex-wrap:wrap}
.pg-btn{width:38px;height:38px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.pg-btn.on{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 14px var(--glow)}
.pg-btn:hover:not(.on){border-color:var(--accent);color:var(--accent)}
/* recent searches */
.recent-wrap{padding:0 4vw;margin-bottom:28px}
.recent-title{font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.recent-tags{display:flex;gap:8px;flex-wrap:wrap}
.recent-tag{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:.8rem;cursor:pointer;transition:all .2s}
.recent-tag:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body class="page-in">
<div id="nav-ph" data-p=""></div>
<div id="toast-root"></div>

<!-- SEARCH HERO -->
<div class="srch-hero">
  <div class="srch-title">Search <span>Manga</span></div>
  <div class="srch-sub">Find manga, manhwa, manhua, webtoons and more</div>
  <div style="position:relative;max-width:700px">
    <div class="srch-bar-big">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="mainSearch" placeholder="Search by title, author, genre…" autocomplete="off"
        oninput="onSearchInput(this.value)" onkeydown="onSearchKey(event)">
      <button class="srch-clear" onclick="clearSearch()" id="clearBtn" style="display:none">✕</button>
    </div>
    <div class="suggestions" id="suggestions" style="display:none"></div>
  </div>
</div>

<!-- RECENT SEARCHES -->
<div class="recent-wrap" id="recentWrap">
  <div class="recent-title">Recent Searches</div>
  <div class="recent-tags" id="recentTags"></div>
</div>

<!-- FILTERS -->
<div class="filter-row">
  <span class="filter-label">Filter:</span>
  <select class="filter-select" id="fGenre" onchange="applyFilters()">
    <option value="">All Genres</option>
    <option>Action</option><option>Fantasy</option><option>Romance</option>
    <option>Horror</option><option>Comedy</option><option>Drama</option>
    <option>Historical</option><option>Adventure</option><option>Isekai</option>
    <option>Supernatural</option><option>Dark Fantasy</option><option>Slice of Life</option>
  </select>
  <select class="filter-select" id="fStatus" onchange="applyFilters()">
    <option value="">All Status</option>
    <option value="ongoing">Ongoing</option>
    <option value="completed">Completed</option>
  </select>
  <select class="filter-select" id="fPlan" onchange="applyFilters()">
    <option value="">Free & Premium</option>
    <option value="free">Free Only</option>
    <option value="premium">Premium Only</option>
  </select>
  <select class="filter-select" id="fDir" onchange="applyFilters()">
    <option value="">All Directions</option>
    <option value="rtl">Right-to-Left</option>
    <option value="ltr">Left-to-Right</option>
    <option value="scroll">Vertical Scroll</option>
  </select>
  <button class="sort-btn" onclick="clearFilters()">✕ Clear</button>
</div>

<!-- ACTIVE FILTERS -->
<div class="active-filters" id="activeFilters"></div>

<!-- SORT + VIEW -->
<div class="sort-bar">
  <div class="result-count">Showing <span id="resCount">0</span> results</div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="sort-opts">
      <div class="sort-btn on" data-s="relevance" onclick="setSort('relevance',this)">Relevance</div>
      <div class="sort-btn"    data-s="rating"    onclick="setSort('rating',this)">Rating</div>
      <div class="sort-btn"    data-s="chapters"  onclick="setSort('chapters',this)">Chapters</div>
      <div class="sort-btn"    data-s="new"       onclick="setSort('new',this)">Newest</div>
    </div>
    <div class="view-toggle">
      <button class="vt-btn on" id="gridViewBtn" onclick="setView('grid')" title="Grid view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="vt-btn" id="listViewBtn" onclick="setView('list')" title="List view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="results-grid" id="resultsGrid"></div>
<div class="no-results" id="noResults" style="display:none">
  <div class="nr-icon">🔍</div>
  <h3>No Results Found</h3>
  <p id="noResultsMsg">Try a different search term or adjust your filters.</p>
  <button class="btn btn-outline" onclick="clearSearch()">Clear Search</button>
</div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<div id="foot-ph"></div>
<script src="app.js"></script>
<script>
let query='', sortBy='relevance', viewMode='grid', currentSort='relevance';
let filters={genre:'',status:'',plan:'',dir:''};
let recentSearches=JSON.parse(localStorage.getItem('al_recent')||'[]');
const PER_PAGE=12;
let currentPageNum=1;

/* ── Init ── */
document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  const q=p.get('q')||'';
  const genre=p.get('genre')||'';
  const sort=p.get('sort')||'';
  const status=p.get('status')||'';
  if(q){ document.getElementById('mainSearch').value=q; query=q; document.getElementById('clearBtn').style.display='flex'; }
  if(genre){ document.getElementById('fGenre').value=genre; filters.genre=genre; }
  if(status){ document.getElementById('fStatus').value=status; filters.status=status; }
  if(sort){ setSort(sort,document.querySelector(`[data-s="${sort}"]`)||document.querySelectorAll('.sort-btn')[0]); }
  buildRecent();
  doSearch();
});

function onSearchInput(v){
  query=v;
  document.getElementById('clearBtn').style.display=v?'flex':'none';
  showSuggestions(v);
  doSearch();
}
function onSearchKey(e){
  if(e.key==='Enter'){
    document.getElementById('suggestions').style.display='none';
    saveRecent(query);
    doSearch();
  }
  if(e.key==='Escape') document.getElementById('suggestions').style.display='none';
}
function clearSearch(){
  query=''; document.getElementById('mainSearch').value='';
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('suggestions').style.display='none';
  doSearch();
}
function clearFilters(){
  filters={genre:'',status:'',plan:'',dir:''};
  ['fGenre','fStatus','fPlan','fDir'].forEach(id=>document.getElementById(id).value='');
  doSearch();
}
function applyFilters(){
  filters.genre=document.getElementById('fGenre').value;
  filters.status=document.getElementById('fStatus').value;
  filters.plan=document.getElementById('fPlan').value;
  filters.dir=document.getElementById('fDir').value;
  currentPageNum=1;
  doSearch();
}
function setSort(s,el){
  currentSort=s;
  document.querySelectorAll('.sort-btn[data-s]').forEach(b=>b.classList.remove('on'));
  if(el) el.classList.add('on');
  doSearch();
}
function setView(v){
  viewMode=v;
  document.getElementById('gridViewBtn').classList.toggle('on',v==='grid');
  document.getElementById('listViewBtn').classList.toggle('on',v==='list');
  renderResults(getFiltered());
}

function getFiltered(){
  let res=[...MANGA_DB];
  if(query){
    const q=query.toLowerCase();
    res=res.filter(m=>m.title.toLowerCase().includes(q)||m.author.toLowerCase().includes(q)||m.genres.some(g=>g.toLowerCase().includes(q)));
  }
  if(filters.genre) res=res.filter(m=>m.genres.some(g=>g.toLowerCase()===filters.genre.toLowerCase()));
  if(filters.status) res=res.filter(m=>m.status===filters.status);
  if(filters.plan) res=res.filter(m=>m.plan===filters.plan);
  if(filters.dir) res=res.filter(m=>m.direction===filters.dir);
  // sort
  if(currentSort==='rating')   res.sort((a,b)=>b.rating-a.rating);
  if(currentSort==='chapters') res.sort((a,b)=>b.chapters-a.chapters);
  if(currentSort==='new')      res.sort((a,b)=>b.year-a.year);
  return res;
}

function doSearch(){
  const res=getFiltered();
  document.getElementById('resCount').textContent=res.length;
  document.getElementById('recentWrap').style.display=query?'none':'';
  updateActiveFilters();
  renderResults(res);
  buildPagination(res.length);
  document.getElementById('noResults').style.display=res.length?'none':'block';
  document.getElementById('resultsGrid').style.display=res.length?'':'none';
  document.getElementById('noResultsMsg').textContent=query?`No results for "${query}"`:'No manga match your filters.';
}

function renderResults(res){
  const grid=document.getElementById('resultsGrid');
  const start=(currentPageNum-1)*PER_PAGE, end=start+PER_PAGE;
  const page=res.slice(start,end);
  grid.className='results-grid'+(viewMode==='list'?' list-view':'');
  if(viewMode==='list'){
    grid.innerHTML=page.map(m=>`
    <div class="list-card" onclick="goDetail('${m.slug}')">
      <img src="${m.cover}" alt="${m.title}" loading="lazy">
      <div class="list-info">
        <div class="list-title">${m.title}</div>
        <div class="list-author">${m.author}</div>
        <div class="list-desc">${m.desc}</div>
        <div class="list-meta">
          ${starsHTML(m.rating)}
          <span class="badge ${m.status==='ongoing'?'badge-ongoing':'badge-completed'}">${m.status}</span>
          <span class="badge ${m.plan==='premium'?'badge-premium':'badge-free'}">${m.plan==='premium'?'⭐ Premium':'Free'}</span>
          <span style="font-size:.74rem;color:var(--text-dim)">Ch.${m.chapters}</span>
        </div>
      </div>
    </div>`).join('');
  } else {
    grid.innerHTML=page.map(buildCard).join('');
  }
}

function buildPagination(total){
  const pages=Math.ceil(total/PER_PAGE);
  const pg=document.getElementById('pagination');
  if(pages<=1){pg.innerHTML='';return;}
  let html='';
  for(let i=1;i<=pages;i++) html+=`<div class="pg-btn ${i===currentPageNum?'on':''}" onclick="goPage(${i})">${i}</div>`;
  pg.innerHTML=html;
}
function goPage(n){ currentPageNum=n; doSearch(); window.scrollTo({top:0,behavior:'smooth'}); }

/* Suggestions */
function showSuggestions(q){
  const box=document.getElementById('suggestions');
  if(!q){box.style.display='none';return;}
  const matches=MANGA_DB.filter(m=>m.title.toLowerCase().startsWith(q.toLowerCase())).slice(0,5);
  if(!matches.length){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML=matches.map(m=>`
  <div class="sugg-item" onclick="pickSugg('${m.title}','${m.slug}')">
    <img src="${m.cover}" alt="${m.title}">
    <div class="sugg-info">
      <div class="sugg-title">${m.title}</div>
      <div class="sugg-meta">${m.author} · Ch.${m.chapters}</div>
    </div>
  </div>`).join('');
}
function pickSugg(title,slug){
  document.getElementById('mainSearch').value=title;
  query=title;
  document.getElementById('suggestions').style.display='none';
  document.getElementById('clearBtn').style.display='flex';
  saveRecent(title); doSearch();
}
document.addEventListener('click',e=>{if(!e.target.closest('.srch-bar-big')&&!e.target.closest('.suggestions')) document.getElementById('suggestions').style.display='none';});

/* Recent */
function saveRecent(q){ if(!q)return; recentSearches=recentSearches.filter(x=>x!==q); recentSearches.unshift(q); recentSearches=recentSearches.slice(0,8); localStorage.setItem('al_recent',JSON.stringify(recentSearches)); buildRecent(); }
function buildRecent(){
  const el=document.getElementById('recentTags');
  if(!recentSearches.length){document.getElementById('recentWrap').style.display='none';return;}
  el.innerHTML=recentSearches.map(r=>`<div class="recent-tag" onclick="pickRecent('${r}')">🕐 ${r}</div>`).join('');
}
function pickRecent(q){ document.getElementById('mainSearch').value=q; query=q; document.getElementById('clearBtn').style.display='flex'; document.getElementById('recentWrap').style.display='none'; doSearch(); }

/* Active filter tags */
function updateActiveFilters(){
  const af=document.getElementById('activeFilters');
  const tags=[];
  if(filters.genre) tags.push({label:'Genre: '+filters.genre,key:'genre'});
  if(filters.status) tags.push({label:'Status: '+filters.status,key:'status'});
  if(filters.plan) tags.push({label:'Plan: '+filters.plan,key:'plan'});
  if(filters.dir) tags.push({label:'Direction: '+filters.dir,key:'dir'});
  af.innerHTML=tags.map(t=>`<div class="af-tag">${t.label}<button onclick="removeFilter('${t.key}')">✕</button></div>`).join('');
}
function removeFilter(key){ filters[key]=''; document.getElementById('f'+key.charAt(0).toUpperCase()+key.slice(1)).value=''; doSearch(); }
</script>
</body>
</html>
